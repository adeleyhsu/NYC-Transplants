  <style>
body {
  margin: 0;
  margin-right: 40%;
  padding-left: 30px;
  overflow: hidden; 
  
  background-image: url('IMAGES/slicedapplebackground.png');
  background-color: #fdf6c1;
 /* The overlay color */
  background-blend-mode: overlay; /* Blends color and image */
  background-size: cover;

  color: #623927;
  font-family: "akzidenz-grotesk-next-pro", sans-serif;
  font-weight: 500;
  font-style: italic;
  line-height: 110%;
}

 /* first two row*/
.container {
  max-width: 70%;
  display: grid;
  grid-template-columns: 220px 250px 200px 300px;
  margin-top: 30px;
  grid-template-rows: 190px 250px;
  
}

.container div {
  justify-items: start; /* Buttons will only be as wide as their text */
  align-items: start;  
}
 /* first two row end*/

 /* last row*/
.container1{
  display: grid;
  grid-template-columns: 190px 160px 250px 300px;

}

.container1 div{
    max-width: 250px;
}

 /* last row end*/


/* SELECT OPTION START*/
select, select::picker(select) {
  appearance: base-select;
  padding: 0.5em 0.5em;
  background-color: #ffffff;

  color: #623927;
  font-family: "akzidenz-grotesk-next-pro", sans-serif;
  font-weight: 500;
  font-style: italic;
  font-size: 1em;
  border: 1px solid;

  position: relative;

}

.dropdown {
  position: relative;
}

option {
  border-color: #8e3b3b;
  background-color: #ffffff;
}

option:checked {
  background-color: #8e3b3b;;
  color: white;
}
/* SELECT OPTION END*/

.image-layer {
  width: 600px;
  height: auto;
  position: absolute;
  margin-bottom: 30px;
  top: 50%;
  left: 80%;
  transform: translate(-50%, -53%);
  cursor: auto;
}

.labell{
font-family: "fayte-pixel-hard", sans-serif;
font-weight: 400;
font-style: normal;
font-size: 3em;
line-height: 1em;
color: rgb(207, 15, 66);
position: relative;

}   

.image-layer .flip-horiztonal {
    width: 600px;
  height: auto;
  position: absolute;
  margin-bottom: 30px;
  top: 50%;
  left: 80%;
  transform: translate(-50%, -53%) scaleX(-1);
  cursor: auto;
}

#resetButton {
 bottom: 0; right: 0%;
  position: absolute;
  border: none;
  padding: 15px;
  background: none;
  z-index: 100;
}

#resetButton:hover {
  scale: 1.2;
  cursor: pointer;
}

.greenapple{
  width: 100px;
}

.thebigred {
top: 0; right: 0%;
  border-radius: 70%;
  padding: 5px;
  width: 140px;
  position: absolute;
  z-index: 100;
}

.thebigred:hover{
  transform: scale(1.2);
  cursor: pointer;
}


  </style>
</head>

<script>

  const resetButton = document.getElementById('resetButton');

  const choice1Buttons = document.querySelectorAll('input[name="choice1"]');
  const hairButtons = document.querySelectorAll('input[name="hair"]');
  const shoesButtons = document.querySelectorAll('input[name="shoes"]');
  const bottomsButtons = document.querySelectorAll('input[name="bottoms"]');
  const topsButtons = document.querySelectorAll('input[name="tops"]');
  const jacketsButtons = document.querySelectorAll('input[name="jackets"]');
  const otherButtons = document.querySelectorAll('input[name="other"]');
  const drinkButtons = document.querySelectorAll('input[name="drink"]');
  const bagButtons = document.querySelectorAll('input[name="bag"]');
  const socksButtons = document.querySelectorAll('input[name="socks"]');
  const backgroundsButtons = document.querySelectorAll('input[name="backgrounds"]');

  const imageContainer = document.getElementById('imageContainer');
  const baseImage = document.getElementById('baseImage');
  const hairImage = document.getElementById('hairImage');
  const shoesImage = document.getElementById('shoesImage');
  const bottomsImage = document.getElementById('bottomsImage');
  const topsImage = document.getElementById('topsImage');
  const jacketsImage = document.getElementById('jacketsImage');
  const otherImage = document.getElementById('otherImage');
  const drinkImage = document.getElementById('drinkImage');
  const bagImage = document.getElementById('bagImage');
  const socksImage = document.getElementById('socksImage');
  const backgroundsImage = document.getElementById('backgroundsImage');


  function createImage(id) {
    const img = document.createElement('img');
    img.id = id;
    img.className = 'image-layer';
    img.style.display = 'none';
    imageContainer.appendChild(img);
    return img;
  }


  // Reset button
  resetButton.addEventListener('click', () => {
    localStorage.clear();
    
    hairImage.style.display = 'none';
    shoesImage.style.display = 'none';
    bottomsImage.style.display = 'none';
    topsImage.style.display = 'none';
    jacketsImage.style.display = 'none';
    otherImage.style.display = 'none';
    drinkImage.style.display = 'none';
    bagImage.style.display = 'none';
    socksImage.style.display = 'none';
    
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.checked = false;
    });
    
    document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
      checkbox.checked = false;
    });
    
    document.querySelectorAll('.image-layer').forEach(img => {
      if (img.id !== 'baseImage' && img.id !== 'hairImage' && img.id !== 'shoesImage' && 
          img.id !== 'bottomsImage' && img.id !== 'topsImage' && img.id !== 'jacketsImage' && 
          img.id !== 'otherImage' && img.id !== 'drinkImage' && img.id !== 'bagImage' && 
          img.id !== 'socksImage' && img.id !== 'backgroundsImage') {
        img.remove();
      }
    });
    
    document.getElementById('powers').selectedIndex = 0;
  });

  // choice1 = masc bod
  choice1Buttons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      baseImage.src = e.target.value;
      baseImage.style.display = 'block';
      baseImage.style.zIndex = '1'; // Bottom layer
    });
  });

        // socks
  socksButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        socksImage.style.display = 'none';
      } else {
        socksImage.src = e.target.value;
        socksImage.style.display = 'block';
        socksImage.style.zIndex = '2';

      }
    });
  });

  // hair
  hairButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        hairImage.style.display = 'none';
      } else {
        hairImage.src = e.target.value;
        hairImage.style.display = 'block';
        hairImage.style.zIndex = '3';

      }
    });
  });

  // shoes  
  shoesButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        shoesImage.style.display = 'none';
      } else {
        shoesImage.src = e.target.value;
        shoesImage.style.display = 'block';
        shoesImage.style.zIndex = '4';
      }
    });
  });

    // tops  
  topsButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        topsImage.style.display = 'none';
      } else { 
        topsImage.src = e.target.value;
        topsImage.style.display = 'block';
        topsImage.style.zIndex = '7';
      }
    });
  });

  // bottoms  
  bottomsButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        bottomsImage.style.display = 'none';
      } else {
        bottomsImage.src = e.target.value;
        bottomsImage.style.display = 'block';
        bottomsImage.style.zIndex = '5';
      }
    });
  });

  // jackets
  jacketsButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        jacketsImage.style.display = 'none';
      } else {
        jacketsImage.src = e.target.value;
        jacketsImage.style.display = 'block';
        jacketsImage.style.zIndex = '8';
        
      }
    });
  });
 
  // Dogs/other
  otherButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        otherImage.style.display = 'none';
      } else {
        otherImage.src = e.target.value;
        otherImage.style.display = 'block';
        otherImage.style.zIndex = '9';

      }
    });
  });

    // drinks
  drinkButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        drinkImage.style.display = 'none';
      } else {
        drinkImage.src = e.target.value;
        drinkImage.style.display = 'block';
        drinkImage.style.zIndex = '10';

      }
    });
  });

      // bags
  bagButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        bagImage.style.display = 'none';
      } else {
        bagImage.src = e.target.value;
        bagImage.style.display = 'block';
        bagImage.style.zIndex = '11';

      }
    });
  });

      // bags
  backgroundsButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === "") {
        backgroundsImage.style.display = 'none';
      } else {
        backgroundsImage.src = e.target.value;
        backgroundsImage.style.display = 'block';
        backgroundsImage.style.zIndex = '-10';

      }
    });
  });

//checkbox accessories//

  const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
  
  allCheckboxes.forEach(checkbox => {
    const layerName = checkbox.getAttribute('data-layer');
    const img = createImage(layerName + 'Image');
    
    img.style.zIndex = '6';
    
    checkbox.addEventListener('change', (e) => {
      if (e.target.checked) {
        img.src = e.target.value;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }
    });
  });
</script>
